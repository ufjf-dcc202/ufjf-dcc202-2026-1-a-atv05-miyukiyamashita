<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letícia Yamashita</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    p {
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .btn {
      background: #fff;
      color: #667eea;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Letícia Yamashita </h1>
    <p>Essa é minha página no GitHub Pages </p>
    <button class="btn" onclick="mensagem()">Clique aqui</button>
  </div>

  <script>
    function mensagem() {
      alert("Bem-vindo(a) à minha página!");
    }
  </script>

</body>
</html>
